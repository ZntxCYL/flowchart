<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简单流程图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
header h1 { font-size: 16px; font-weight: 600; color: #e94560; letter-spacing: 1px; }
.toolbar { display: flex; gap: 8px; align-items: center; }
.btn { background: #0f3460; border: 1px solid #e94560; color: #e0e0e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; font-family: inherit; }
.btn:hover { background: #e94560; color: #fff; }
.btn.active { background: #e94560; color: #fff; }
.sep { width: 1px; height: 24px; background: #0f3460; margin: 0 4px; }
#canvas-container { flex: 1; position: relative; overflow: hidden; background: #1a1a2e; background-image: radial-gradient(circle, #2a2a4a 1px, transparent 1px); background-size: 20px 20px; }
canvas { display: block; cursor: crosshair; }
.panel { position: absolute; top: 16px; right: 16px; background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px; min-width: 200px; display: none; z-index: 10; }
.panel.visible { display: block; }
.panel-title { font-size: 12px; color: #e94560; margin-bottom: 8px; font-weight: 600; }
.panel-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.panel-row label { font-size: 12px; color: #aaa; width: 40px; flex-shrink: 0; }
.panel-row select { flex: 1; background: #0f3460; border: 1px solid #2a2a4a; color: #e0e0e0; padding: 5px 8px; border-radius: 4px; font-size: 12px; outline: none; font-family: inherit; }
.panel-row select:focus { border-color: #e94560; }
.panel-row textarea { flex: 1; background: #0f3460; border: 1px solid #2a2a4a; color: #e0e0e0; padding: 5px 8px; border-radius: 4px; font-size: 12px; outline: none; font-family: inherit; resize: vertical; min-height: 56px; max-height: 140px; line-height: 1.4; }
.panel-row textarea:focus { border-color: #e94560; }
.color-btns { display: flex; gap: 6px; }
.color-btn { width: 24px; height: 24px; border-radius: 4px; border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s; }
.color-btn.selected { border-color: #fff; }
.panel-actions { display: flex; gap: 6px; margin-top: 8px; }
.panel-actions .btn { flex: 1; padding: 5px; font-size: 11px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #e94560; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; }
.hint { position: fixed; bottom: 24px; right: 16px; background: #16213e; border: 1px solid #0f3460; border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #666; line-height: 1.6; }
.hint b { color: #e94560; }
</style>
</head>
<body>
<header>
  <h1>流程图</h1>
  <div class="toolbar">
    <button class="btn" onclick="addBlock()">+ 添加节点</button>
    <div class="sep"></div>
    <button class="btn" id="btn-connect" onclick="enterConnectMode()">连线</button>
    <button class="btn" id="btn-select" onclick="enterSelectMode()">选择</button>
    <div class="sep"></div>
    <button class="btn" onclick="deleteSelected()">删除</button>
    <button class="btn" onclick="clearAll()">清空</button>
    <div class="sep"></div>
    <button class="btn" onclick="saveChart()">保存</button>
    <button class="btn" onclick="loadChart()">读取</button>
  </div>
</header>
<div id="canvas-container">
  <canvas id="canvas"></canvas>
  <div class="panel" id="node-panel">
    <div class="panel-title">节点属性</div>
    <div class="panel-row">
      <label>文字</label>
      <textarea id="prop-text" placeholder="输入文字，回车换行" oninput="onTextInput(this.value)"></textarea>
    </div>
    <div class="panel-row">
      <label>概念</label>
      <select id="prop-shape" onchange="updateNodeProp('shape', this.value)">
        <option value="rect">界面</option>
        <option value="ellipse">按钮</option>
        <option value="diamond">条件</option>
      </select>
    </div>
    <div class="panel-row">
      <label>颜色</label>
      <div class="color-btns">
        <div class="color-btn" style="background:#e94560" onclick="setNodeColor('#e94560')"></div>
        <div class="color-btn" style="background:#3b82f6" onclick="setNodeColor('#3b82f6')"></div>
        <div class="color-btn" style="background:#10b981" onclick="setNodeColor('#10b981')"></div>
        <div class="color-btn" style="background:#f59e0b" onclick="setNodeColor('#f59e0b')"></div>
        <div class="color-btn" style="background:#8b5cf6" onclick="setNodeColor('#8b5cf6')"></div>
      </div>
    </div>
    <div class="panel-actions">
      <button class="btn" onclick="deleteSelected()">删除</button>
      <button class="btn" onclick="closeNodePanel()">关闭</button>
    </div>
  </div>
  <div class="panel" id="conn-panel">
    <div class="panel-title">连线</div>
    <div class="panel-actions">
      <button class="btn" onclick="deleteSelectedConn()">删除连线</button>
      <button class="btn" onclick="closeConnPanel()">关闭</button>
    </div>
  </div>
  <div class="hint">
    <b>空格+拖拽</b> 平移 &nbsp; <b>滚轮</b> 缩放<br>
    <b>N</b> 新建 &nbsp; <b>C</b> 连线 &nbsp; <b>V</b> 选择<br>
    <b>Del</b> 删除 &nbsp; <b>Esc</b> 取消
  </div>
</div>
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileLoad(event)">
<div class="toast" id="toast"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');

const LINE_COLOR = '#6b7280';
const MIN_W = 120, MIN_H = 60;
const PAD_X = 20, PAD_Y = 16;

let blocks = [];
let connections = [];
let mode = 'select';
let selected = null;
let selectedConn = null;
let connectFrom = null;
let hoverBlock = null;
let dragStart = null;
let offsetX = 0, offsetY = 0;
let nextId = 1;

// 画布平移与缩放
let panX = 0, panY = 0, zoom = 1;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPanX = 0, panStartPanY = 0;
let spaceDown = false;

function screenToWorld(sx, sy) {
  return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
}

function resize() {
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  render();
}
window.addEventListener('resize', resize);
resize();

function measureBlock(text) {
  const fsize = 13;
  ctx.font = `500 ${fsize}px system-ui`;
  const rawLines = text ? text.split('\n') : [''];
  const wrapped = [];
  let maxLineW = 0;
  for (const raw of rawLines) {
    if (!raw) { wrapped.push(''); continue; }
    let line = '';
    for (const ch of raw) {
      const test = line + ch;
      if (ctx.measureText(test).width > 200 && line) {
        wrapped.push(line);
        maxLineW = Math.max(maxLineW, ctx.measureText(line).width);
        line = ch;
      } else {
        line = test;
      }
    }
    if (line) {
      wrapped.push(line);
      maxLineW = Math.max(maxLineW, ctx.measureText(line).width);
    }
  }
  if (!wrapped.length) wrapped.push('');
  const lh = fsize * 1.4;
  const w = Math.max(MIN_W, maxLineW + PAD_X * 2);
  const h = Math.max(MIN_H, wrapped.length * lh + PAD_Y * 2);
  return { w, h, lines: wrapped, lh };
}

function drawShape(ctx, b, sel, hover) {
  const { w, h, lines, lh } = measureBlock(b.text);
  b.w = w; b.h = h;
  const x = b.x, y = b.y;
  ctx.save();
  ctx.fillStyle = b.color;
  ctx.strokeStyle = sel ? '#fff' : (hover ? '#aaa' : '#3a3a5a');
  ctx.lineWidth = sel ? 2.5 : 1.5;
  ctx.shadowColor = sel ? b.color : 'transparent';
  ctx.shadowBlur = sel ? 14 : 0;

  ctx.beginPath();
  if (b.shape === 'rect') {
    ctx.roundRect(x - w/2, y - h/2, w, h, 6);
  } else if (b.shape === 'diamond') {
    ctx.moveTo(x, y - h/2);
    ctx.lineTo(x + w/2, y);
    ctx.lineTo(x, y + h/2);
    ctx.lineTo(x - w/2, y);
    ctx.closePath();
  } else {
    ctx.ellipse(x, y, w/2, h/2, 0, 0, Math.PI * 2);
  }
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const fsize = 13;
  ctx.font = `500 ${fsize}px system-ui`;
  const startY = y - (lines.length - 1) * lh / 2;
  lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lh));
  ctx.restore();
}

function drawArrow(ctx, x1, y1, x2, y2, isSel) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const len = 12;
  const color = isSel ? '#fff' : LINE_COLOR;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = isSel ? 3 : 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - len * Math.cos(angle - Math.PI / 7), y2 - len * Math.sin(angle - Math.PI / 7));
  ctx.lineTo(x2 - len * Math.cos(angle + Math.PI / 7), y2 - len * Math.sin(angle + Math.PI / 7));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  connections.forEach(c => {
    const a = blocks.find(b => b.id === c.from);
    const b = blocks.find(b => b.id === c.to);
    if (!a || !b) return;
    const [ax, ay] = anchor(a, b);
    const [bx, by] = anchor(b, a);
    const isSel = selectedConn && selectedConn === c;
    drawArrow(ctx, ax, ay, bx, by, isSel);
  });

  if (mode === 'connect' && connectFrom && mousePos) {
    const wp = screenToWorld(mousePos.x, mousePos.y);
    const [cx, cy] = anchor(connectFrom, {x: wp.x, y: wp.y});
    ctx.save();
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(wp.x, wp.y);
    ctx.stroke();
    ctx.restore();
  }

  blocks.forEach(b => {
    const isSel = selected && selected.id === b.id;
    const isHov = hoverBlock && hoverBlock.id === b.id;
    drawShape(ctx, b, isSel, isHov);
  });

  ctx.restore();
}

function anchor(a, b) {
  if (a.shape === 'diamond') {
    const dx = b.x - a.x, dy = b.y - a.y;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (adx < 0.001 && ady < 0.001) return [a.x, a.y];
    const t = 1 / (adx / (a.w / 2) + ady / (a.h / 2));
    return [a.x + dx * t, a.y + dy * t];
  }
  const dx = b.x - a.x, dy = b.y - a.y;
  if (Math.abs(dx) / a.w > Math.abs(dy) / a.h) {
    return [a.x + (dx > 0 ? a.w/2 : -a.w/2), a.y];
  } else {
    return [a.x, a.y + (dy > 0 ? a.h/2 : -a.h/2)];
  }
}

let mousePos = null;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };

  if (isPanning) {
    panX = panStartPanX + (e.clientX - panStartX);
    panY = panStartPanY + (e.clientY - panStartY);
    render();
    return;
  }

  const wp = screenToWorld(mousePos.x, mousePos.y);

  if (mode === 'drag' && dragStart && selected) {
    selected.x = wp.x - offsetX;
    selected.y = wp.y - offsetY;
    render();
    return;
  }

  const hit = hitTest(wp.x, wp.y);
  if (hit !== hoverBlock) {
    hoverBlock = hit;
    render();
  }

  canvas.style.cursor = spaceDown ? 'grab' : (hit ? 'pointer' : (mode === 'connect' ? 'crosshair' : 'default'));
});

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

  // 中键或空格+左键 = 平移
  if (e.button === 1 || (e.button === 0 && spaceDown)) {
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panStartPanX = panX;
    panStartPanY = panY;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }

  const wp = screenToWorld(sx, sy);
  const hit = hitTest(wp.x, wp.y);

  if (mode === 'connect') {
    if (hit) {
      if (!connectFrom) {
        connectFrom = hit;
        selected = hit;
        showNodePanel(hit);
        render();
        toast('点击另一个节点完成连线');
      } else if (hit.id !== connectFrom.id) {
        const exists = connections.find(c =>
          (c.from === connectFrom.id && c.to === hit.id) ||
          (c.from === hit.id && c.to === connectFrom.id));
        if (!exists) {
          connections.push({ from: connectFrom.id, to: hit.id });
        }
        connectFrom = null;
        selected = hit;
        enterSelectMode();
        render();
      }
    } else {
      connectFrom = null;
      render();
    }
    return;
  }

  if (hit) {
    selected = hit;
    selectedConn = null;
    closeConnPanel();
    showNodePanel(hit);
    mode = 'drag';
    dragStart = { x: wp.x, y: wp.y };
    offsetX = wp.x - hit.x;
    offsetY = wp.y - hit.y;
    document.getElementById('btn-select').classList.add('active');
    render();
  } else {
    const conn = hitTestConn(wp.x, wp.y);
    if (conn) {
      selected = null;
      selectedConn = conn;
      closeNodePanel();
      showConnPanel();
      render();
    } else {
      selected = null;
      selectedConn = null;
      closeNodePanel();
      closeConnPanel();
      render();
    }
  }
});

canvas.addEventListener('mouseup', e => {
  if (isPanning) {
    isPanning = false;
    canvas.style.cursor = spaceDown ? 'grab' : 'default';
    return;
  }
  if (mode === 'drag') {
    mode = 'select';
    document.getElementById('btn-select').classList.add('active');
  }
});

canvas.addEventListener('mouseleave', () => {
  mousePos = null;
  hoverBlock = null;
  render();
});

// 滚轮缩放
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const newZoom = Math.max(0.1, Math.min(5, zoom * factor));
  // 以鼠标位置为中心缩放
  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
  render();
}, { passive: false });

// 空格键平移
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
    spaceDown = true;
    canvas.style.cursor = 'grab';
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    spaceDown = false;
    if (!isPanning) canvas.style.cursor = 'default';
  }
});

function hitTest(mx, my) {
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (mx >= b.x - b.w/2 && mx <= b.x + b.w/2 &&
        my >= b.y - b.h/2 && my <= b.y + b.h/2) {
      return b;
    }
  }
  return null;
}

function hitTestConn(mx, my) {
  for (let i = connections.length - 1; i >= 0; i--) {
    const c = connections[i];
    const a = blocks.find(b => b.id === c.from);
    const b = blocks.find(b => b.id === c.to);
    if (!a || !b) continue;
    const [ax, ay] = anchor(a, b);
    const [bx, by] = anchor(b, a);
    if (pointToSegDist(mx, my, ax, ay, bx, by) < 8) return c;
  }
  return null;
}

function pointToSegDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 < 0.001) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function enterSelectMode() {
  mode = 'select';
  connectFrom = null;
  document.getElementById('btn-select').classList.add('active');
  document.getElementById('btn-connect').classList.remove('active');
  render();
}

function enterConnectMode() {
  mode = 'connect';
  connectFrom = null;
  document.getElementById('btn-connect').classList.add('active');
  document.getElementById('btn-select').classList.remove('active');
  closeNodePanel();
  closeConnPanel();
  selected = null;
  selectedConn = null;
  render();
  toast('点击一个节点，再点击另一个节点完成连线');
}

function addBlock() {
  const cx = (canvas.width / 2 - panX) / zoom;
  const cy = (canvas.height / 2 - panY) / zoom;
  const b = {
    id: nextId++,
    x: cx + (Math.random() - 0.5) * 120,
    y: cy + (Math.random() - 0.5) * 80,
    w: MIN_W, h: MIN_H,
    shape: 'rect',
    color: '#e94560',
    text: '新节点'
  };
  blocks.push(b);
  selected = b;
  selectedConn = null;
  closeConnPanel();
  showNodePanel(b);
  render();
}

function deleteSelected() {
  if (selectedConn) {
    deleteSelectedConn();
    return;
  }
  if (!selected) return;
  blocks = blocks.filter(b => b.id !== selected.id);
  connections = connections.filter(c => c.from !== selected.id && c.to !== selected.id);
  closeNodePanel();
  selected = null;
  render();
}

function deleteSelectedConn() {
  if (!selectedConn) return;
  connections = connections.filter(c => c !== selectedConn);
  selectedConn = null;
  closeConnPanel();
  render();
}

function clearAll() {
  blocks = [];
  connections = [];
  selected = null;
  selectedConn = null;
  closeNodePanel();
  closeConnPanel();
  nextId = 1;
  render();
}

function showNodePanel(b) {
  document.getElementById('prop-text').value = b.text || '';
  document.getElementById('prop-shape').value = b.shape || 'rect';
  updateColorSelection(b.color);
  document.getElementById('node-panel').classList.add('visible');
}

function updateColorSelection(color) {
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.style.background === color);
  });
}

function setNodeColor(color) {
  if (!selected) return;
  selected.color = color;
  updateColorSelection(color);
  render();
}

function closeNodePanel() {
  document.getElementById('node-panel').classList.remove('visible');
}

function showConnPanel() {
  document.getElementById('conn-panel').classList.add('visible');
}

function closeConnPanel() {
  document.getElementById('conn-panel').classList.remove('visible');
}

function onTextInput(val) {
  if (!selected) return;
  selected.text = val;
  render();
}

function updateNodeProp(key, val) {
  if (!selected) return;
  if (key === 'shape') selected.shape = val;
  render();
}

async function saveChart() {
  const data = { blocks, connections, nextId, panX, panY, zoom };
  const json = JSON.stringify(data, null, 2);
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'flowchart.json',
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(json);
      await writable.close();
      toast('已保存: ' + handle.name);
      return;
    } catch (e) { if (e.name === 'AbortError') return; }
  }
  const name = prompt('输入文件名', 'flowchart.json');
  if (!name) return;
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.endsWith('.json') ? name : name + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('已保存: ' + a.download);
}

function loadChart() {
  document.getElementById('file-input').click();
}

function handleFileLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.blocks || !Array.isArray(data.blocks)) throw new Error('格式错误');
      blocks = data.blocks;
      connections = data.connections || [];
      nextId = data.nextId || (blocks.length ? Math.max(...blocks.map(b => b.id)) + 1 : 1);
      panX = data.panX || 0;
      panY = data.panY || 0;
      zoom = data.zoom || 1;
      selected = null;
      selectedConn = null;
      closeNodePanel();
      closeConnPanel();
      render();
      toast('已读取');
    } catch (err) {
      toast('读取失败: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if ((e.key === 'Delete' || e.key === 'Backspace')) {
    if (selectedConn) deleteSelectedConn();
    else if (selected) deleteSelected();
  }
  if (e.key === 'Escape') {
    closeNodePanel();
    closeConnPanel();
    selected = null;
    selectedConn = null;
    connectFrom = null;
    enterSelectMode();
  }
  if (e.key === 'c' || e.key === 'C') enterConnectMode();
  if (e.key === 'v' || e.key === 'V') enterSelectMode();
  if (e.key === 'n' || e.key === 'N') addBlock();
});

document.getElementById('btn-select').classList.add('active');
</script>
</body>
</html>
